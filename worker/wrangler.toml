name = "fabric-extractor"
main = "fabric-extractor.js"
compatibility_date = "2024-11-01"

# 배포 후 패널 주소로 좁히기를 권장합니다(오남용/비용 방지).
# 예: "https://choosingceo-taek.github.io"
[vars]
ALLOWED_ORIGIN = "*"

# ── 공유 카탈로그 저장소 (하드차단 사이트용, 무료 KV) ─────────
# binding 이름(RACK_CACHE)은 코드가 참조하는 값이라 반드시 이대로 두세요.
# (id 는 wrangler kv namespace create 로 만든 네임스페이스 식별자 — 비밀 아님)
[[kv_namespaces]]
binding = "RACK_CACHE"
id = "213f721dac574936b7592d5f659963a2"

# ── 시크릿(코드/저장소에 넣지 말 것) ──────────────────────────
# 반드시 CLI로 주입:
#
# [OAuth 설치 플로우 — 여러 팀이 "설치 링크"만으로 썸네일까지 쓰게 하는 권장 방식]
#   wrangler secret put CLIENT_ID        (미로 앱 설정의 Client ID)
#   wrangler secret put CLIENT_SECRET    (미로 앱 설정의 Client secret)
#   → 그리고 미로 앱 설정 "Redirect URI for OAuth" 에
#      https://<이 worker 주소>/oauth/callback  을 등록.
#   → 팀에 공유할 설치 링크:  https://<이 worker 주소>/install
#
# [레거시 — 단일 팀만 쓸 때(개인 토큰)]
#   wrangler secret put MIRO_TOKEN       (미로 앱 "Install app and get OAuth token"의 토큰)
#
# (선택) 원단 분석 레거시 기능:  wrangler secret put GEMINI_API_KEY
# (선택) 오남용 방지용 공유 토큰:  wrangler secret put ACCESS_TOKEN
