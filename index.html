<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>이미지 링크 추출기</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      margin: 0; padding: 16px; color: #1a1a2e; background: #fff;
    }
    h1 { font-size: 16px; margin: 0 0 4px; }
    p.desc { font-size: 12px; color: #666; margin: 0 0 16px; line-height: 1.5; }
    button {
      width: 100%; padding: 10px 12px; font-size: 14px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: default; }
    #run { background: #4262ff; color: #fff; }
    #downloadXlsx { background: #16a34a; color: #fff; margin-top: 8px; display: none; }
    #downloadCsv { background: #eef0f5; color: #333; margin-top: 6px; display: none; }
    #analyzeFabric { background: #7c3aed; color: #fff; margin-top: 10px; display: none; }
    #downloadFabricXlsx { background: #0d9488; color: #fff; margin-top: 6px; display: none; }
    #oneClick { background: #7c3aed; color: #fff; font-size: 15px; padding: 13px; }
    #linkOnly { background: #0d9488; color: #fff; margin-top: 8px; }
    details.settings button { margin-top: 8px; }
    details.settings { margin-top: 12px; font-size: 12px; color: #555; }
    details.settings summary { cursor: pointer; user-select: none; }
    details.settings label { display: block; margin: 8px 0 2px; font-weight: 600; }
    details.settings input, details.settings textarea {
      width: 100%; padding: 6px 8px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; resize: vertical;
    }
    hr.sep { border: none; border-top: 1px solid #eee; margin: 20px 0 16px; }
    #importFetch { background: #eef0f5; color: #333; margin-top: 8px; }
    #importAdd { background: #4262ff; color: #fff; margin-top: 8px; display: none; }
    #importStatus { font-size: 12px; margin: 8px 0 4px; color: #444; }
    #importGrid {
      display: none; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-top: 10px; max-height: 320px; overflow-y: auto; padding-right: 2px;
    }
    .imp-card {
      border: 1px solid #eee; border-radius: 8px; padding: 6px; font-size: 10px;
      cursor: pointer; position: relative; user-select: none;
    }
    .imp-card.sel { border-color: #4262ff; background: #f4f6ff; }
    .imp-card img {
      width: 100%; height: 84px; object-fit: cover; border-radius: 6px;
      background: #f1f1f4; display: block; margin-bottom: 4px; pointer-events: none;
    }
    .imp-card .t {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.3; pointer-events: none;
    }
    .imp-card .chk {
      position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; pointer-events: none;
    }
    #importToolbar { display: flex; gap: 8px; align-items: center; margin-top: 8px; font-size: 11px; color: #666; }
    #importToolbar button {
      width: auto; padding: 4px 8px; font-size: 11px; font-weight: 500;
      background: #f4f4f7; color: #444; border-radius: 6px;
    }
    .fbadge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 6px; margin-left: 4px; vertical-align: middle; }
    .fbadge.ok { background: #e7f6ec; color: #16794a; }
    .fbadge.warn { background: #fff4e5; color: #a15c00; }
    .fbadge.err { background: #fdeaea; color: #b42318; }
    .comp { font-weight: 600; }
    #status { font-size: 12px; margin: 12px 0 4px; min-height: 16px; color: #444; }
    .summary {
      display: none; margin-top: 12px; font-size: 12px;
      background: #f4f6ff; border-radius: 8px; padding: 12px;
    }
    .summary b { color: #4262ff; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 11px; display: none; }
    th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #eee; vertical-align: top; }
    th { color: #888; font-weight: 600; }
    td a { color: #4262ff; word-break: break-all; }
    td.imgcell { width: 64px; }
    .thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; background: #f1f1f4; display: block; }
    .ttl { font-weight: 600; margin-bottom: 3px; word-break: break-all; }
    .muted { color: #bbb; }
  </style>
</head>
<body>
  <!-- 패널 UI (앱 아이콘 클릭 시 표시) -->
  <div id="app" style="display:none">
    <h1>🧵 HS Fabric Linker</h1>
    <p class="desc">보드 사진에 걸린 <b>상품 링크</b>를 열어 각 상품의 <b>썸네일 · URL · 원단 혼용률</b>을
      정리한 <b>엑셀(.xlsx)</b>을 한 번에 만듭니다.</p>

    <button id="oneClick">📋 원단 정보 엑셀 만들기</button>
    <button id="linkOnly">🖼 썸네일+URL만</button>

    <details class="settings" id="fabricSettings">
      <summary>⚙︎ 원단 분석 서버 설정 (최초 1회)</summary>
      <label for="workerUrl">Worker URL (Cloudflare 함수 주소)</label>
      <input id="workerUrl" type="url" placeholder="https://…workers.dev" />
      <label for="accessToken">Access token (선택)</label>
      <input id="accessToken" type="text" placeholder="서버에 ACCESS_TOKEN을 설정한 경우만" />
    </details>

    <div id="status"></div>
    <div class="summary" id="summary"></div>

    <hr class="sep">
    <h1>📥 상품 가져오기</h1>
    <p class="desc">쇼핑몰 <b>컬렉션 URL</b>에서 신상품을 가져와 미리보고,
      선택한 상품만 <b>이미지+링크</b>로 보드에 추가합니다. (Shopify 기반 쇼핑몰만 지원)</p>

    <details class="settings" open>
      <summary>가져올 컬렉션</summary>
      <label for="importCollections">컬렉션 URL (줄마다 하나씩)</label>
      <textarea id="importCollections" rows="3" placeholder="https://www.thereformation.com/collections/tops
https://www.thereformation.com/collections/dresses"></textarea>
      <label for="importLimit">컬렉션당 최대 개수</label>
      <input id="importLimit" type="number" min="1" max="100" value="30" />
    </details>

    <button id="importFetch">🔎 가져오기 미리보기</button>
    <div id="importStatus"></div>
    <div id="importToolbar" style="display:none">
      <span id="importCount"></span>
      <button id="importSelAll">전체 선택</button>
      <button id="importSelNone">전체 해제</button>
    </div>
    <div id="importGrid"></div>
    <button id="importAdd">➕ 선택한 상품 보드에 추가</button>

    <table id="preview">
      <thead>
        <tr><th>이미지</th><th>제목 / 링크</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    // 이 파일 하나가 두 가지 역할을 합니다.
    //  - ?view=panel  → 오른쪽에 뜨는 패널 UI
    //  - 그 외        → 보드 로딩 시 실행되는 앱 진입점(아이콘 클릭 등록)
    const params = new URLSearchParams(location.search);

    // 원단 분석 서버(Worker)를 이미지 프록시로도 사용 → 남의 도메인 이미지 CORS 우회.
    // (initPanel()보다 먼저 선언돼야 함 — 안 그러면 TDZ 오류로 패널 스크립트 전체가 멈춥니다.)
    let __proxy = { url: '', token: '' };
    let __boardId = ''; // 미로 REST API로 보드 이미지를 받아올 때 필요(썸네일용).

    if (params.get('view') === 'panel') {
      initPanel();
    } else {
      miro.board.ui.on('icon:click', async () => {
        // v=타임스탬프로 매번 새 URL을 만들어 브라우저 캐시를 우회합니다.
        await miro.board.ui.openPanel({ url: 'index.html?view=panel&v=' + Date.now() });
      });
    }

    function initPanel() {
      document.getElementById('app').style.display = 'block';

      // 기타 도구 버튼은 UI에서 제거됨. 공유 함수(collectRows/analyzeAll/buildFabricXlsx)가
      // 참조하는 disabled/style/addEventListener만 무해하게 받아주는 스텁으로 대체(널 오류 방지).
      const _stubBtn = () => ({ disabled: false, style: {}, addEventListener() {} });
      const runBtn = _stubBtn();
      const xlsxBtn = _stubBtn();
      const csvBtn = _stubBtn();
      const fabricBtn = _stubBtn();
      const fabricXlsxBtn = _stubBtn();
      const workerUrlEl = document.getElementById('workerUrl');
      const accessTokenEl = document.getElementById('accessToken');
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');
      const table = document.getElementById('preview');
      const tbody = table.querySelector('tbody');

      let rows = [];

      // 원단 분석 서버 설정을 브라우저에 기억(팀원마다 1회만 입력).
      const syncProxy = () => {
        __proxy = { url: (workerUrlEl.value || '').trim(), token: (accessTokenEl.value || '').trim() };
      };
      try {
        workerUrlEl.value = localStorage.getItem('fabricWorkerUrl') || '';
        accessTokenEl.value = localStorage.getItem('fabricAccessToken') || '';
      } catch (e) {}
      syncProxy();
      workerUrlEl.addEventListener('change', () => {
        try { localStorage.setItem('fabricWorkerUrl', workerUrlEl.value.trim()); } catch (e) {}
        syncProxy();
      });
      accessTokenEl.addEventListener('change', () => {
        try { localStorage.setItem('fabricAccessToken', accessTokenEl.value.trim()); } catch (e) {}
        syncProxy();
      });

      // ── 원클릭: 추출 → 원단 분석 → 엑셀 다운로드 (한 번에) ────────────
      const heroBtn = document.getElementById('oneClick');
      heroBtn.addEventListener('click', async () => {
        if (!(workerUrlEl.value || '').trim()) {
          document.getElementById('fabricSettings').open = true;
          statusEl.textContent = '먼저 ⚙︎ 설정에서 Worker URL을 입력하세요 (최초 1회).';
          return;
        }
        heroBtn.disabled = true;
        try {
          await collectRows();
          if (!rows.length) return; // 상태 메시지는 collectRows가 이미 표시
          const targets = rows.filter(r => r.link);
          if (!targets.length) { statusEl.textContent = '링크가 걸린 사진이 없습니다.'; return; }
          const res = await analyzeAll();
          if (!res) return; // 워커/타깃 문제로 중단
          await buildFabricXlsx();
        } catch (e) {
          statusEl.textContent = '오류: ' + ((e && e.message) || e);
        } finally {
          heroBtn.disabled = false;
        }
      });

      // ── 썸네일+URL만: 썸네일은 "미로 보드 이미지"라서 사이트 접속이 아예 필요 없음 ──
      // (Worker는 엑셀에 이미지를 넣을 때 CORS 우회 프록시로만 쓰임)
      const linkOnlyBtn = document.getElementById('linkOnly');
      linkOnlyBtn.addEventListener('click', async () => {
        if (!(workerUrlEl.value || '').trim()) {
          document.getElementById('fabricSettings').open = true;
          statusEl.textContent = '먼저 ⚙︎ 설정에서 Worker URL을 입력하세요 (최초 1회).';
          return;
        }
        linkOnlyBtn.disabled = true; heroBtn.disabled = true;
        try {
          await collectRows();
          const targets = rows.filter(r => r.link);
          if (!targets.length) { statusEl.textContent = '링크가 걸린 사진이 없습니다.'; return; }
          targets.forEach(r => {
            r.fabric = { product_name: '', image_url: '', composition: [], materials: [], status: 'skipped', note: '' };
          });
          renderPreview();
          await buildFabricXlsx();
          statusEl.textContent = `썸네일+URL 정리 완료 (${targets.length}건, 원단은 미분석).`;
        } catch (e) {
          statusEl.textContent = '오류: ' + ((e && e.message) || e);
        } finally {
          linkOnlyBtn.disabled = false; heroBtn.disabled = false;
        }
      });

      // ── 📥 상품 가져오기: 쇼핑몰 컬렉션 → 미리보기 → 선택한 것만 보드에 추가 ──
      const importCollectionsEl = document.getElementById('importCollections');
      const importLimitEl = document.getElementById('importLimit');
      const importFetchBtn = document.getElementById('importFetch');
      const importAddBtn = document.getElementById('importAdd');
      const importStatusEl = document.getElementById('importStatus');
      const importGridEl = document.getElementById('importGrid');
      const importToolbarEl = document.getElementById('importToolbar');
      const importCountEl = document.getElementById('importCount');
      const importSelAllBtn = document.getElementById('importSelAll');
      const importSelNoneBtn = document.getElementById('importSelNone');
      try {
        importCollectionsEl.value = localStorage.getItem('importCollections') || '';
      } catch (e) {}
      importCollectionsEl.addEventListener('change', () => {
        try { localStorage.setItem('importCollections', importCollectionsEl.value); } catch (e) {}
      });

      let importItems = []; // { title, url, image, selected }

      importFetchBtn.addEventListener('click', async () => {
        if (!(workerUrlEl.value || '').trim()) {
          document.getElementById('fabricSettings').open = true;
          importStatusEl.textContent = '먼저 ⚙︎ 설정에서 Worker URL을 입력하세요 (최초 1회).';
          return;
        }
        const urls = (importCollectionsEl.value || '').split('\n').map(s => s.trim()).filter(Boolean);
        if (!urls.length) { importStatusEl.textContent = '컬렉션 URL을 한 줄에 하나씩 입력하세요.'; return; }
        const limit = Math.min(Math.max(parseInt(importLimitEl.value, 10) || 30, 1), 100);

        importFetchBtn.disabled = true;
        importGridEl.style.display = 'none';
        importToolbarEl.style.display = 'none';
        importAddBtn.style.display = 'none';
        importItems = [];
        importStatusEl.textContent = `가져오는 중… (0/${urls.length})`;

        const base = __proxy.url.replace(/\/+$/, '');
        const seen = new Set();
        let done = 0, errors = [];
        for (const cu of urls) {
          try {
            const q = base + '?collection=' + encodeURIComponent(cu) + '&limit=' + limit +
              (__proxy.token ? '&token=' + encodeURIComponent(__proxy.token) : '');
            const resp = await fetch(q);
            const data = await resp.json();
            if (!resp.ok || data.ok === false) {
              errors.push(`${cu} → ${data.status || resp.status}`);
            } else {
              (data.items || []).forEach(it => {
                if (it.url && !seen.has(it.url)) { seen.add(it.url); importItems.push({ ...it, selected: true }); }
              });
            }
          } catch (e) {
            errors.push(`${cu} → ${(e && e.message) || e}`);
          }
          done++;
          importStatusEl.textContent = `가져오는 중… (${done}/${urls.length})`;
        }

        importFetchBtn.disabled = false;
        if (!importItems.length) {
          importStatusEl.textContent = '가져온 상품이 없습니다.' + (errors.length ? ' 오류: ' + errors.join(' / ') : '');
          return;
        }
        importStatusEl.innerHTML = `${importItems.length}개 상품을 찾았습니다.` +
          (errors.length ? `<br><span style="color:#b42318">일부 실패: ${escapeHtml(errors.join(' / '))}</span>` : '');
        renderImportGrid();
      });

      function renderImportGrid() {
        importGridEl.innerHTML = '';
        importItems.forEach((it, idx) => {
          const card = document.createElement('div');
          card.className = 'imp-card' + (it.selected ? ' sel' : '');
          card.innerHTML =
            `<input type="checkbox" class="chk" ${it.selected ? 'checked' : ''}>` +
            `<img src="${escapeHtml(it.image)}" alt="" loading="lazy">` +
            `<div class="t">${escapeHtml(it.title) || '(제목 없음)'}</div>`;
          card.addEventListener('click', () => {
            it.selected = !it.selected;
            card.classList.toggle('sel', it.selected);
            card.querySelector('.chk').checked = it.selected;
            updateImportToolbar();
          });
          importGridEl.appendChild(card);
        });
        importGridEl.style.display = 'grid';
        importToolbarEl.style.display = 'flex';
        importAddBtn.style.display = 'block';
        updateImportToolbar();
      }

      function updateImportToolbar() {
        const n = importItems.filter(it => it.selected).length;
        importCountEl.textContent = `${n} / ${importItems.length}개 선택됨`;
      }

      importSelAllBtn.addEventListener('click', () => {
        importItems.forEach(it => it.selected = true);
        renderImportGrid();
      });
      importSelNoneBtn.addEventListener('click', () => {
        importItems.forEach(it => it.selected = false);
        renderImportGrid();
      });

      importAddBtn.addEventListener('click', async () => {
        const targets = importItems.filter(it => it.selected);
        if (!targets.length) { importStatusEl.textContent = '선택한 상품이 없습니다.'; return; }
        importAddBtn.disabled = true;
        try {
          let startX = 0, startY = 0;
          try {
            const vp = await miro.board.viewport.get();
            startX = vp.x + 60; startY = vp.y + 60;
          } catch (e) {}
          const cellW = 220, gap = 30, cols = 5;
          const created = [];
          for (let i = 0; i < targets.length; i++) {
            const it = targets[i];
            importStatusEl.textContent = `보드에 추가하는 중… (${i + 1}/${targets.length})`;
            try {
              const col = i % cols, row = Math.floor(i / cols);
              const img = await miro.board.createImage({
                title: it.title,
                url: it.image,
                x: startX + col * (cellW + gap) + cellW / 2,
                y: startY + row * (cellW + gap) + cellW / 2,
                width: cellW,
              });
              img.linkedTo = it.url;
              await img.sync();
              created.push(img);
            } catch (e) { /* 이 상품만 건너뜀 */ }
          }
          try { if (created.length && miro.board.viewport.zoomTo) await miro.board.viewport.zoomTo(created); } catch (e) {}
          importStatusEl.textContent = `완료! ${created.length}/${targets.length}개를 보드에 추가했습니다.`;
        } finally {
          importAddBtn.disabled = false;
        }
      });

      // ── 1) 보드에서 이미지 + 링크 수집 ──────────────────────────────
      runBtn.addEventListener('click', collectRows);
      async function collectRows() {
        runBtn.disabled = true;
        xlsxBtn.style.display = 'none';
        csvBtn.style.display = 'none';
        table.style.display = 'none';
        summaryEl.style.display = 'none';
        tbody.innerHTML = '';
        statusEl.textContent = '보드에서 이미지를 불러오는 중…';

        try {
          // Web SDK가 페이지네이션을 알아서 처리해 보드의 모든 이미지를 반환합니다.
          const images = await miro.board.get({ type: 'image' });

          // 미로는 "업로드된 이미지"의 원본 주소를 Web SDK로 노출하지 않습니다.
          // → 실제 이미지는 REST API로만 받을 수 있어, 보드 ID + 아이템 ID를
          //   Worker(서버에 저장된 미로 토큰 사용)에 넘겨 프록시로 가져옵니다.
          if (!__boardId) {
            try { const info = await miro.board.getInfo(); __boardId = (info && info.id) || ''; } catch (e) {}
          }

          rows = images.map((img, i) => ({
            index: i + 1,
            id: img.id,
            title: (img.title || '').trim(),
            link: (img.linkedTo || '').trim(),   // 사진에 걸어둔 하이퍼링크
            imageUrl: miroThumbUrl(img.id)       // 미로 보드 이미지(Worker 프록시 경유)
          }));

          const withLink = rows.filter(r => r.link).length;

          statusEl.textContent = '';
          summaryEl.style.display = 'block';
          summaryEl.innerHTML =
            `전체 사진 <b>${rows.length}</b>개 중 링크가 걸린 사진 <b>${withLink}</b>개를 찾았습니다.`;

          // 썸네일(미로 보드 이미지)은 Worker + 서버의 미로 토큰이 있어야 들어갑니다.
          if (rows.length && (!__proxy.url || !__boardId)) {
            const why = !__proxy.url
              ? `아래 <b>⚙︎ 원단 분석 서버 설정</b>에 <b>Worker URL</b>을 입력하세요.`
              : `보드 ID를 가져오지 못했습니다. 패널을 새로고침(F5) 후 다시 시도하세요.`;
            summaryEl.innerHTML +=
              `<div style="margin-top:8px;padding:8px;background:#fff7e6;border-radius:6px">` +
              `<b>ℹ 썸네일(미로 이미지)을 넣으려면</b> ${why}</div>`;
          }

          // 미리보기 (최대 50줄) — 썸네일 + 제목/링크 (+원단, 분석 후)
          renderPreview();

          if (rows.length) {
            xlsxBtn.style.display = 'block';
            csvBtn.style.display = 'block';
            if (withLink) fabricBtn.style.display = 'block';
          } else {
            statusEl.textContent = '이 보드에서 이미지를 찾지 못했습니다.';
          }
        } catch (e) {
          statusEl.textContent = '오류가 발생했습니다: ' + (e && e.message ? e.message : e);
        } finally {
          runBtn.disabled = false;
        }
      }

      // ── 2) 이미지가 들어간 엑셀(.xlsx) 만들기 ────────────────────────
      xlsxBtn.addEventListener('click', async () => {
        if (typeof ExcelJS === 'undefined') {
          statusEl.textContent = '엑셀 라이브러리를 불러오지 못했습니다. 잠시 후 새로고침 뒤 다시 시도하세요.';
          return;
        }
        xlsxBtn.disabled = true;
        csvBtn.disabled = true;

        try {
          const workbook = new ExcelJS.Workbook();
          const ws = workbook.addWorksheet('사진링크');
          ws.columns = [
            { header: '번호', key: 'index', width: 6 },
            { header: '이미지', key: 'img', width: 16 },
            { header: '제목', key: 'title', width: 22 },
            { header: '링크(하이퍼링크)', key: 'link', width: 48 },
            { header: '이미지원본URL', key: 'imageUrl', width: 48 },
            { header: '아이템ID', key: 'id', width: 24 }
          ];
          ws.getRow(1).font = { bold: true };

          let ok = 0, fail = 0;
          for (let i = 0; i < rows.length; i++) {
            const r = rows[i];
            const excelRow = i + 2; // 1행은 헤더
            const row = ws.addRow({
              index: r.index,
              img: '',
              title: r.title,
              link: '',
              imageUrl: r.imageUrl,
              id: r.id ? String(r.id) : ''
            });
            row.height = 60;
            ws.getCell(`F${excelRow}`).numFmt = '@'; // 아이템ID를 텍스트로(지수표기 방지)

            if (r.link) {
              const c = ws.getCell(`D${excelRow}`);
              c.value = { text: r.link, hyperlink: r.link };
              c.font = { color: { argb: 'FF4262FF' }, underline: true };
            }

            if (r.imageUrl) {
              try {
                const { base64, w, h } = await toPng(r.imageUrl, 100);
                const imageId = workbook.addImage({ base64, extension: 'png' });
                ws.addImage(imageId, {
                  tl: { col: 1.05, row: (excelRow - 1) + 0.05 },
                  ext: { width: w, height: h },
                  editAs: 'oneCell'
                });
                row.height = Math.max(row.height, h * 0.75 + 6);
                ok++;
              } catch (e) {
                const c = ws.getCell(`B${excelRow}`);
                c.value = '(이미지 불러오기 실패)';
                c.font = { color: { argb: 'FFBBBBBB' }, size: 9 };
                fail++;
              }
            }
            statusEl.textContent = `엑셀 만드는 중… ${i + 1}/${rows.length}  (이미지 성공 ${ok}, 실패 ${fail})`;
          }

          const buf = await workbook.xlsx.writeBuffer();
          downloadBlob(
            new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }),
            `miro_image_links_${stamp()}.xlsx`
          );

          statusEl.textContent =
            `완료! 이미지 ${ok}개 삽입` +
            (fail ? `, ${fail}개 실패(미로 이미지 접근 제한).` : '.');
        } catch (e) {
          statusEl.textContent = '엑셀 생성 중 오류: ' + (e && e.message ? e.message : e);
        } finally {
          xlsxBtn.disabled = false;
          csvBtn.disabled = false;
        }
      });

      // ── 3) (선택) 텍스트만 CSV ──────────────────────────────────────
      csvBtn.addEventListener('click', () => {
        const header = ['번호', '제목', '링크(하이퍼링크)', '이미지원본URL', '아이템ID'];
        const lines = [header].concat(
          rows.map(r => [r.index, r.title, r.link, r.imageUrl, r.id])
        );
        const csv = lines.map(cols =>
          cols.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')
        ).join('\r\n');
        // BOM('﻿')을 붙여야 엑셀에서 한글이 깨지지 않습니다.
        downloadBlob(
          new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }),
          `miro_image_links_${stamp()}.csv`
        );
      });

      // ── 4) 원단 정보 분석 (링크된 상품 페이지 → Claude web_fetch) ──────
      fabricBtn.addEventListener('click', analyzeAll);
      async function analyzeAll() {
        const workerUrl = (workerUrlEl.value || '').trim();
        if (!workerUrl) {
          document.getElementById('fabricSettings').open = true;
          statusEl.textContent = '먼저 아래 ⚙︎ 원단 분석 서버 설정에서 Worker URL을 입력하세요.';
          return;
        }
        const token = (accessTokenEl.value || '').trim();
        const targets = rows.filter(r => r.link);
        if (!targets.length) { statusEl.textContent = '링크가 걸린 사진이 없습니다.'; return; }

        fabricBtn.disabled = true; xlsxBtn.disabled = true; csvBtn.disabled = true;
        fabricXlsxBtn.style.display = 'none';

        let done = 0, okc = 0, failc = 0;
        const update = () => {
          statusEl.textContent = `원단 분석 중… ${done}/${targets.length} (성공 ${okc}, 실패 ${failc})`;
        };
        update();

        const sleep = ms => new Promise(res => setTimeout(res, ms));
        const isQuota = note => /429|quota|resource_exhausted|rate.?limit/i.test(String(note || ''));

        // 무료 티어 한도를 지키려 동시 2개만 + 429(한도) 시 대기 후 자동 재시도.
        await runPool(targets, 2, async (r) => {
          let data = null;
          for (let attempt = 0; attempt < 4; attempt++) {
            try {
              const headers = { 'Content-Type': 'application/json' };
              if (token) headers['x-access-token'] = token;
              const resp = await fetch(workerUrl, {
                method: 'POST', headers, body: JSON.stringify({ url: r.link }),
              });
              data = await resp.json();
            } catch (e) {
              data = { status: 'error', note: String((e && e.message) || e) };
            }
            if (isQuota(data && (data.note || data.error)) && attempt < 3) {
              const wait = 15 * (attempt + 1);
              statusEl.textContent = `무료 한도 대기 중… ${done}/${targets.length} (${wait}초 후 재시도)`;
              await sleep(wait * 1000);
              continue;
            }
            break;
          }
          data = data || {};
          r.fabric = {
            product_name: data.product_name || '',
            image_url: data.image_url || '',
            composition: Array.isArray(data.composition) ? data.composition : [],
            materials: Array.isArray(data.materials) ? data.materials : [],
            status: data.status || 'error',
            note: data.note || (data.error || ''),
          };
          if (r.fabric.status === 'ok' && (r.fabric.composition.length || r.fabric.materials.length)) okc++;
          else failc++;
          done++; update(); renderPreview();
        });

        fabricBtn.disabled = false; xlsxBtn.disabled = false; csvBtn.disabled = false;
        fabricXlsxBtn.style.display = 'block';
        statusEl.textContent = `원단 분석 완료 — 성공 ${okc} / 실패 ${failc}.`;
        return { okc, failc };
      }

      // ── 5) 원단 포함 엑셀(.xlsx): 상품 시트 + 소재 통계/차트 ──────────
      fabricXlsxBtn.addEventListener('click', buildFabricXlsx);
      async function buildFabricXlsx() {
        if (typeof ExcelJS === 'undefined') {
          statusEl.textContent = '엑셀 라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도하세요.';
          return;
        }
        fabricXlsxBtn.disabled = true;
        try {
          // 링크 걸린 것만(빈 공백 제거) + 브랜드순 정렬
          const items = rows.filter(r => r.link).slice()
            .sort((a, b) => brandFromUrl(a.link).localeCompare(brandFromUrl(b.link)) ||
                            a.link.localeCompare(b.link));
          if (!items.length) {
            statusEl.textContent = '링크가 걸린 사진이 없습니다.';
            fabricXlsxBtn.disabled = false;
            return;
          }

          const workbook = new ExcelJS.Workbook();
          const ws = workbook.addWorksheet('원단정보');
          ws.columns = [
            { header: '브랜드', key: 'brand', width: 18 },
            { header: '썸네일', key: 'img', width: 18 },
            { header: 'URL', key: 'link', width: 46 },
            { header: '소재', key: 'materials', width: 24 },
            { header: '혼용률', key: 'comp', width: 30 },
            { header: '상태', key: 'status', width: 12 },
          ];
          ws.getRow(1).font = { bold: true };

          let ok = 0, fail = 0;
          let thumbFailDiag = '';   // 첫 썸네일 실패의 실제 원인(Worker 응답)
          for (let i = 0; i < items.length; i++) {
            const r = items[i];
            const excelRow = i + 2;
            const f = r.fabric || {};
            const compStr = (f.composition || []).map(c => `${c.material} ${c.percent}%`).join(' / ');
            const row = ws.addRow({
              brand: brandFromUrl(r.link), img: '', link: '',
              comp: compStr, materials: (f.materials || []).join(', '),
              status: shortReason(f),
            });
            row.height = 60;
            // URL(하이퍼링크) = C열
            const c = ws.getCell(`C${excelRow}`);
            c.value = { text: r.link, hyperlink: r.link };
            c.font = { color: { argb: 'FF4262FF' }, underline: true };
            // 썸네일(B열) = 링크가 걸려있던 "미로 보드 이미지" (사이트 접속 불필요·항상 정확).
            // 보드 이미지를 못 가져올 때만 상품 페이지 대표 이미지로 폴백. Worker 프록시로 CORS 우회.
            const thumbCandidates = [r.imageUrl, f.image_url].filter(Boolean);
            let thumbDone = false;
            for (const src of thumbCandidates) {
              try {
                const { base64, w, h } = await toPng(src, 110);
                const id = workbook.addImage({ base64, extension: 'png' });
                ws.addImage(id, { tl: { col: 1.1, row: (excelRow - 1) + 0.1 }, ext: { width: w, height: h }, editAs: 'oneCell' });
                row.height = Math.max(row.height, h * 0.75 + 6);
                thumbDone = true;
                break;
              } catch (e) { /* 다음 후보로 */ }
            }
            if (!thumbDone && thumbCandidates.length) {
              ws.getCell(`B${excelRow}`).value = '(썸네일 실패)';
              // 첫 실패는 원인을 직접 조회해 화면에 표시(보통 Worker의 MIRO_TOKEN 문제).
              if (!thumbFailDiag && r.imageUrl) thumbFailDiag = await diagnoseThumb(r.imageUrl);
            }
            if (f.status === 'ok' && (compStr || (f.materials || []).length)) ok++; else fail++;
            statusEl.textContent = `엑셀 만드는 중… ${i + 1}/${items.length}`;
          }

          // 소재 통계 시트 + 시각화(도넛: 구성 비중, 막대: 등장 빈도)
          const stats = computeMaterialStats();
          const ss = workbook.addWorksheet('소재통계');
          ss.columns = [
            { header: '소재', key: 'm', width: 18 },
            { header: '총 비중(%)', key: 'share', width: 12 },
            { header: '등장 상품수', key: 'count', width: 12 },
            { header: '평균 혼용률(%)', key: 'avg', width: 14 },
          ];
          ss.getRow(1).font = { bold: true };
          stats.forEach(s => ss.addRow({
            m: s.material,
            share: Math.round(s.share * 10) / 10,
            count: s.count,
            avg: s.avg != null ? Math.round(s.avg * 10) / 10 : '',
          }));
          try {
            const donut = drawDonut(stats);
            if (donut) {
              const did = workbook.addImage({ base64: donut.base64, extension: 'png' });
              ss.addImage(did, { tl: { col: 5, row: 1 }, ext: { width: donut.w, height: donut.h } });
            }
            const bar = drawBarChart(stats.slice(0, 10));
            if (bar) {
              const bid = workbook.addImage({ base64: bar.base64, extension: 'png' });
              ss.addImage(bid, { tl: { col: 5, row: 17 }, ext: { width: bar.w, height: bar.h } });
            }
          } catch (e) {}

          const buf = await workbook.xlsx.writeBuffer();
          downloadBlob(
            new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }),
            `miro_fabric_${stamp()}.xlsx`
          );
          statusEl.textContent = `완료! 원단 추출 성공 ${ok} / 실패 ${fail}.`;
          if (thumbFailDiag) {
            summaryEl.style.display = 'block';
            summaryEl.innerHTML =
              `<div style="padding:8px;background:#fff4f4;border-radius:6px">` +
              `<b>⚠ 썸네일 실패 원인</b><br>${escapeHtml(thumbFailDiag)}</div>`;
          }
        } catch (e) {
          statusEl.textContent = '엑셀 생성 중 오류: ' + ((e && e.message) || e);
        } finally {
          fabricXlsxBtn.disabled = false;
        }
      }

      // 썸네일(미로 프록시) 실패 시, 그 URL을 직접 조회해 사람이 읽을 원인으로 변환.
      async function diagnoseThumb(url) {
        let status = 0, body = '';
        try {
          const resp = await fetch(url);
          status = resp.status;
          try { body = (await resp.text()).slice(0, 300); } catch (e) {}
        } catch (e) {
          return `Worker에 연결하지 못했습니다 (${(e && e.message) || e}). ⚙︎ 설정의 Worker URL을 확인하세요.`;
        }
        const b = (body || '').toLowerCase();
        if (status === 200) return `이미지 응답은 정상(200)인데 엑셀 삽입에 실패했습니다. 형식 문제일 수 있어요: ${escapeHtml(body).slice(0,120)}`;
        if (b.includes('miro_token')) return `Worker에 미로 토큰(MIRO_TOKEN)이 없습니다. worker 폴더에서 "wrangler secret put MIRO_TOKEN" 후 "wrangler deploy" 하세요.`;
        if (status === 401 && b.includes('unauthorized')) return `접근 토큰(ACCESS_TOKEN) 불일치입니다. ⚙︎ 설정의 Access token 값을 Worker와 동일하게 맞추세요.`;
        if (b.includes('miro item 401') || b.includes('miro item 403')) return `미로 토큰이 만료/무효입니다(${status}). 미로 앱의 "Install app and get OAuth token"에서 토큰을 새로 받아 MIRO_TOKEN을 다시 넣고 재배포하세요.`;
        if (b.includes('miro item 404')) return `미로가 이 이미지를 찾지 못했습니다(404). 앱 권한(boards:read)과 토큰이 이 보드가 속한 팀의 것인지 확인하세요.`;
        if (b.includes('miro imageurl missing')) return `미로 응답에 이미지 주소가 없습니다. 앱 권한(boards:read)을 확인하세요.`;
        return `Worker 응답 ${status}: ${escapeHtml(body).slice(0, 160) || '(본문 없음)'}`;
      }

      // ── 미리보기 렌더 (분석 후 원단 열 추가) ─────────────────────────
      function renderPreview() {
        const hasFabric = rows.some(r => r.fabric);
        const thead = table.querySelector('thead');
        thead.innerHTML = hasFabric
          ? '<tr><th>이미지</th><th>제목 / 링크</th><th>원단</th></tr>'
          : '<tr><th>이미지</th><th>제목 / 링크</th></tr>';
        tbody.innerHTML = '';
        rows.slice(0, 50).forEach(r => {
          const tr = document.createElement('tr');

          const imgTd = document.createElement('td');
          imgTd.className = 'imgcell';
          if (r.imageUrl) {
            const im = document.createElement('img');
            im.className = 'thumb';
            im.src = r.imageUrl;
            im.alt = '';
            im.loading = 'lazy';
            im.onerror = () => {
              const s = document.createElement('span');
              s.className = 'muted';
              s.textContent = '미리보기 불가';
              im.replaceWith(s);
            };
            imgTd.appendChild(im);
          } else {
            imgTd.innerHTML = '<span class="muted">-</span>';
          }

          const infoTd = document.createElement('td');
          const linkHtml = r.link
            ? `<a href="${escapeHtml(r.link)}" target="_blank" rel="noopener">${escapeHtml(r.link)}</a>`
            : '<span class="muted">(링크 없음)</span>';
          infoTd.innerHTML =
            `<div class="ttl">${escapeHtml(r.title) || '<span class="muted">(제목 없음)</span>'}</div>` +
            `<div>${linkHtml}</div>`;

          tr.appendChild(imgTd);
          tr.appendChild(infoTd);

          if (hasFabric) {
            const fTd = document.createElement('td');
            fTd.innerHTML = fabricCellHtml(r.fabric);
            tr.appendChild(fTd);
          }
          tbody.appendChild(tr);
        });
        if (rows.length > 50) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td colspan="${hasFabric ? 3 : 2}" class="muted">…나머지 ${rows.length - 50}개는 파일에서 확인하세요</td>`;
          tbody.appendChild(tr);
        }
        table.style.display = rows.length ? 'table' : 'none';
      }

      function fabricCellHtml(f) {
        if (!f) return '<span class="muted">-</span>';
        const comp = (f.composition || []).map(c => `${escapeHtml(c.material)} ${c.percent}%`).join(' / ');
        const mats = (f.materials || []).map(escapeHtml).join(', ');
        let badge = '';
        if (f.status === 'no_data') badge = '<span class="fbadge warn">정보없음</span>';
        else if (f.status === 'blocked') badge = '<span class="fbadge warn">접근차단</span>';
        else if (f.status && f.status !== 'ok') badge = '<span class="fbadge err">실패</span>';
        const main = comp
          ? `<span class="comp">${comp}</span>`
          : (mats ? escapeHtml(mats) : '<span class="muted">-</span>');
        const note = f.note ? `<div class="muted" style="font-size:10px">${escapeHtml(f.note)}</div>` : '';
        return main + badge + note;
      }

      function statusLabel(s) {
        if (s === 'ok') return '추출됨';
        if (s === 'no_data') return '정보없음';
        if (s === 'blocked') return '접근차단';
        return s ? '실패' : '';
      }

      // 상태/실패사유를 3단어 이내 한글로 요약.
      function shortReason(f) {
        f = f || {};
        const s = f.status;
        const hasData = (f.composition && f.composition.length) || (f.materials && f.materials.length);
        if (s === 'ok') return hasData ? '추출됨' : '정보없음';
        if (s === 'skipped') return '미분석';
        if (s === 'no_data') return '정보없음';
        if (s === 'blocked') return '접근차단';
        const note = String(f.note || '').toLowerCase();
        if (note.includes('429') || note.includes('quota') || note.includes('resource_exhausted')) return '한도초과';
        if (note.includes('api_key') || note.includes('secret')) return '서버설정오류';
        if (note.includes('402') || note.includes('credit') || note.includes('billing')) return '결제필요';
        if (note.includes('401') || note.includes('unauthorized')) return '인증오류';
        if (note.includes('timeout') || note.includes('시간')) return '시간초과';
        if (note.includes('fetch') || note.includes('network') || note.includes('502') || note.includes('503')) return '네트워크오류';
        return '실패';
      }

      // material -> {count(등장 상품수), avg(평균 혼용률), share(전체 구성 비중)}
      function computeMaterialStats() {
        const map = new Map();
        let totalPercent = 0;
        rows.forEach(r => {
          const f = r.fabric;
          if (!f) return;
          const comp = f.composition || [];
          const seen = new Set();
          comp.forEach(c => {
            if (!c || !c.material) return;
            const m = c.material;
            seen.add(m);
            const e = map.get(m) || { count: 0, sum: 0, n: 0 };
            if (typeof c.percent === 'number' && !Number.isNaN(c.percent)) {
              e.sum += c.percent; e.n++; totalPercent += c.percent;
            }
            map.set(m, e);
          });
          const mats = seen.size ? seen : new Set((f.materials || []).filter(Boolean));
          mats.forEach(m => {
            const e = map.get(m) || { count: 0, sum: 0, n: 0 };
            e.count++;
            map.set(m, e);
          });
        });
        const arr = [...map.entries()].map(([material, e]) => ({
          material, count: e.count, avg: e.n ? e.sum / e.n : null,
          share: totalPercent ? (e.sum / totalPercent) * 100 : 0,
        }));
        // 전체 구성 비중(원단 데이터의 핵심) 우선 정렬
        arr.sort((a, b) => b.share - a.share || b.count - a.count);
        return arr;
      }

      // 도넛 차트: 전체 상품의 원단 구성 비중(혼용률 가중) — 원단 데이터에 가장 직관적인 시각자료.
      function drawDonut(items) {
        const data = (items || []).filter(i => i.share > 0);
        if (!data.length) return null;
        const palette = ['#7c3aed', '#2563eb', '#0d9488', '#16a34a', '#d97706',
                         '#dc2626', '#db2777', '#0891b2', '#65a30d', '#9333ea'];
        const top = data.slice(0, 8);
        const rest = data.slice(8).reduce((s, i) => s + i.share, 0);
        if (rest > 0.05) top.push({ material: '기타', share: rest });

        const W = 470, H = 300, cx = 145, cy = 160, rO = 108, rI = 58;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('원단 구성 비중 (전체 상품 기준)', 12, 24);

        const total = top.reduce((s, i) => s + i.share, 0) || 1;
        let a0 = -Math.PI / 2;
        top.forEach((it, idx) => {
          const a1 = a0 + (it.share / total) * Math.PI * 2;
          ctx.beginPath(); ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, rO, a0, a1); ctx.closePath();
          ctx.fillStyle = palette[idx % palette.length]; ctx.fill();
          a0 = a1;
        });
        ctx.beginPath(); ctx.arc(cx, cy, rI, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();

        // 범례 (오른쪽)
        ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
        let ly = 56;
        top.forEach((it, idx) => {
          ctx.fillStyle = palette[idx % palette.length];
          ctx.fillRect(290, ly - 10, 13, 13);
          ctx.fillStyle = '#333';
          ctx.fillText(`${it.material}  ${Math.round(it.share * 10) / 10}%`, 310, ly + 1);
          ly += 22;
        });
        return { base64: canvas.toDataURL('image/png').split(',')[1], w: W, h: H };
      }

      function drawBarChart(items) {
        if (!items || !items.length) return null;
        const W = 440, barH = 22, gap = 10, padL = 120, padR = 44, padT = 34, padB = 12;
        const H = padT + padB + items.length * (barH + gap);
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#1a1a2e'; ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('소재별 등장 상품수', padL, 20);
        const max = Math.max.apply(null, items.map(i => i.count).concat([1]));
        ctx.font = '12px sans-serif';
        items.forEach((it, idx) => {
          const y = padT + idx * (barH + gap);
          const w = Math.round((W - padL - padR) * (it.count / max));
          ctx.fillStyle = '#7c3aed'; ctx.fillRect(padL, y, w, barH);
          ctx.fillStyle = '#333'; ctx.textAlign = 'right';
          ctx.fillText(it.material, padL - 8, y + barH - 6);
          ctx.fillStyle = '#111'; ctx.textAlign = 'left';
          ctx.fillText(String(it.count), padL + w + 6, y + barH - 6);
        });
        return { base64: canvas.toDataURL('image/png').split(',')[1], w: W, h: H };
      }

      // 동시 실행 풀
      async function runPool(items, size, fn) {
        let i = 0;
        const n = Math.min(size, items.length);
        const workers = new Array(n).fill(0).map(async () => {
          while (i < items.length) {
            const idx = i++;
            await fn(items[idx]);
          }
        });
        await Promise.all(workers);
      }
    }

    // 미로 보드 이미지의 실제 파일은 Web SDK로 노출되지 않고 REST API로만 받을 수 있습니다.
    // 그래서 (보드ID, 아이템ID)를 Worker에 넘겨 프록시로 받아옵니다. Worker가 서버에 저장된
    // 미로 토큰(MIRO_TOKEN)으로 이미지를 인증해 가져와 CORS 허용 헤더로 돌려줍니다.
    function miroThumbUrl(itemId) {
      if (!__proxy.url || !__boardId || !itemId) return '';
      const base = __proxy.url.replace(/\/+$/, '');
      return base +
        '?board=' + encodeURIComponent(__boardId) +
        '&item=' + encodeURIComponent(itemId) +
        (__proxy.token ? '&token=' + encodeURIComponent(__proxy.token) : '');
    }

    // 이미지 주소 → 다운스케일 PNG(base64).
    // 직접 fetch가 CORS로 막히면 Worker 프록시(?img=)로 자동 재시도 → 엑셀에 이미지가 실제로 들어감.
    async function toPng(url, maxSize) {
      try {
        return await fetchToPng(url, maxSize);
      } catch (e) {
        if (__proxy.url && !/[?&]img=/.test(url)) {
          const p = __proxy.url.replace(/\/+$/, '') + '?img=' + encodeURIComponent(url) +
            (__proxy.token ? '&token=' + encodeURIComponent(__proxy.token) : '');
          return await fetchToPng(p, maxSize);
        }
        throw e;
      }
    }

    async function fetchToPng(url, maxSize) {
      const resp = await fetch(url, { mode: 'cors' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const blob = await resp.blob();
      const objUrl = URL.createObjectURL(blob);
      try {
        const img = await loadImage(objUrl); // blob: URL이라 canvas 오염 없음
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        return { base64: canvas.toDataURL('image/png').split(',')[1], w, h };
      } finally {
        URL.revokeObjectURL(objUrl);
      }
    }

    function loadImage(src) {
      return new Promise((res, rej) => {
        const im = new Image();
        im.onload = () => res(im);
        im.onerror = () => rej(new Error('이미지 로드 실패'));
        im.src = src;
      });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function stamp() { return new Date().toISOString().slice(0, 10); }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // URL 도메인 → 브랜드명. 알려진 몰은 예쁜 이름으로, 그 외는 도메인 라벨을 대문자로.
    function brandFromUrl(url) {
      if (!url) return '';
      let host = '';
      try { host = new URL(url).hostname; }
      catch (e) {
        const m = String(url).match(/^(?:https?:\/\/)?([^/]+)/i);
        host = m ? m[1] : '';
      }
      host = host.replace(/^www\d*\./i, '').toLowerCase();
      const parts = host.split('.');
      const base = parts.length >= 2 ? parts.slice(-2).join('.') : host;
      const known = {
        'hm.com': 'H&M',
        'etam.com': 'Etam',
        'eberjey.com': 'Eberjey',
        'gap.com': 'Gap',
        'intimissimi.com': 'Intimissimi',
        'negativeunderwear.com': 'Negative Underwear',
        'marksandspencer.com': 'M&S',
        'nextdirect.com': 'Next',
        'ae.com': 'American Eagle',
        'mango.com': 'Mango',
      };
      if (known[base]) return known[base];
      const label = parts.length >= 2 ? parts[parts.length - 2] : (parts[0] || '');
      return label ? label.charAt(0).toUpperCase() + label.slice(1) : host;
    }
  </script>
